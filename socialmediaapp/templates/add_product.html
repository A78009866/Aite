{% block content %}
<div class="container mt-5">
    <div class="card form-card">
        <h2 class="text-center text-dark">📦 إضافة منتج جديد</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_name">اسم المنتج</label>
                {{ form.name }}
            </div>

            <div class="form-group">
                <label for="id_description">الوصف</label>
                {{ form.description }}
            </div>

            <div class="form-group">
                <label for="id_price">السعر</label>
                {{ form.price }}
            </div>

            <div class="form-group">
                <label for="id_image">صورة المنتج</label>
                {{ form.image }}
            </div>

            <button type="submit" class="btn btn-submit">🛒 إضافة المنتج</button>
        </form>
    </div>
</div>

<style>
    body {
        background-color: #f8f9fa;
    }

    .form-card {
        max-width: 500px;
        margin: auto;
        padding: 20px;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
    }

    h2 {
        font-weight: bold;
        margin-bottom: 20px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        font-weight: bold;
        color: #333;
        display: block;
        margin-bottom: 5px;
    }

    input, textarea, select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 8px;
        transition: border 0.3s ease;
    }

    input:focus, textarea:focus {
        border-color: #1877f2;
        outline: none;
    }

    .btn-submit {
        display: block;
        width: 100%;
        padding: 10px;
        background: #28a745;
        color: white;
        font-weight: bold;
        border-radius: 8px;
        border: none;
        transition: background 0.3s;
    }

    .btn-submit:hover {
        background: #218838;
    }

    /* ✅ تحسين للهواتف */
    @media (max-width: 768px) {
        .form-card {
            width: 90%;
        }
    }
</style>
{% endblock %}
