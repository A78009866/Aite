{% block content %}
<div class="chat-container">
    <div class="chat-header">
        <h3 class="chat-title">محادثة مع {{ other_user.username }}</h3>
    </div>
    <div id="chat-box" class="chat-box">
        {% for message in messages %}
            <div class="message {% if message.sender == request.user %}sent{% else %}received{% endif %}">
                <p><strong>{{ message.sender.username }}:</strong> {{ message.content }}</p>
            </div>
        {% endfor %}
    </div>
    <div class="chat-input-container">
        <input type="text" id="message-input" class="chat-input" placeholder="اكتب رسالة..." autocomplete="off">
        <button id="send-btn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #f0f2f5;
}
.chat-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 100%;
    background: white;
}
.chat-header {
    padding: 15px;
    background: #007bff;
    color: white;
    text-align: center;
    font-size: 18px;
}
.chat-box {
    flex-grow: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    background: #f8f9fa;
}
.message {
    max-width: 75%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    font-size: 16px;
    word-wrap: break-word;
}
.sent {
    align-self: flex-end;
    background: #007bff;
    color: white;
}
.received {
    align-self: flex-start;
    background: #e9ecef;
}
.chat-input-container {
    display: flex;
    padding: 10px;
    background: white;
    border-top: 1px solid #ccc;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
}
.chat-input {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: 1px solid #ccc;
    font-size: 16px;
}
.send-btn {
    margin-left: 10px;
    padding: 12px 15px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
}
.send-btn i {
    font-size: 18px;
}
@media (max-width: 600px) {
    .chat-box {
        padding: 10px;
    }
    .message {
        font-size: 14px;
    }
    .chat-input {
        font-size: 14px;
    }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
    let chatBox = document.getElementById("chat-box");
    let messageInput = document.getElementById("message-input");
    let sendButton = document.getElementById("send-btn");
    let otherUser = "{{ other_user.username }}";
    let lastMessageId = 0;

    function fetchMessages() {
        fetch(`/chat/${otherUser}/get-messages/`)
        .then(response => response.json())
        .then(messages => {
            chatBox.innerHTML = "";
            messages.forEach(msg => {
                addMessageToChat(msg, false);
                lastMessageId = msg.id;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    function sendMessage() {
        let message = messageInput.value.trim();
        if (!message) return;

        fetch("{% url 'send_message' %}", {
            method: "POST",
            headers: {
                "X-CSRFToken": "{{ csrf_token }}",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({receiver: otherUser, content: message})
        })
        .then(response => response.json())
        .then(data => {
            if (!data.error) {
                addMessageToChat(data, true);
                messageInput.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });
    }

    function addMessageToChat(msg, isNew) {
        let messageDiv = document.createElement("div");
        messageDiv.classList.add("message");
        if (msg.sender === "{{ request.user.username }}") {
            messageDiv.classList.add("sent");
        } else {
            messageDiv.classList.add("received");
        }

        messageDiv.innerHTML = `<p><strong>${msg.sender}:</strong> ${msg.content}</p>`;
        chatBox.appendChild(messageDiv);

        if (isNew) {
            lastMessageId = msg.id;
        }
    }

    function fetchNewMessages() {
        fetch(`/chat/${otherUser}/get-messages/`)
        .then(response => response.json())
        .then(messages => {
            messages.forEach(msg => {
                if (msg.id > lastMessageId) {
                    addMessageToChat(msg, true);
                    lastMessageId = msg.id;
                }
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    sendButton.addEventListener("click", sendMessage);
    messageInput.addEventListener("keypress", function (event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });

    setInterval(fetchNewMessages, 3000);
    fetchMessages();
});
</script>
{% endblock %}
